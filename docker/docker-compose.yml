version: '3.8'

services:
  maelstrom:
    image: maelstrom:${IMAGE_TAG:-latest}
    networks:
      - public
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - maelstrom_sqlite_data:/data
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.maelstrom.rule=Host(`madinapp.fr`) && PathPrefix(`/maelstrom`)"
        - "traefik.http.routers.maelstrom.entrypoints=websecure"
        - "traefik.http.routers.maelstrom.tls.certresolver=myresolver"
        - "traefik.http.services.maelstrom.loadbalancer.server.port=3000"

networks:
  public:
    external: true

volumes:
  maelstrom_sqlite_data:
